</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-3 px-md-5">

      <a class="navbar-brand d-flex align-items-center gap-2 logo m-0 text-decoration-none" href="#">
        <span>Q´inti</span>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="mainNav">
        <ul class="navbar-nav mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Guía</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Temas</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Recursos</a></li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="background">
    <div class="container py-4 py-md-5">

      <!-- Botón superior -->
      <div class="text-center mb-4">
        <a href="../../html/derechosDeAutor/DerechosDeAutor.html"
           class="bubbleTop d-inline-block">
          Conceptos básicos
        </a>
      </div>

      <!-- Caja centrada -->
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">

<section class="info-box">

  <h2 class="mb-3">Normativa Internacional</h2>

  <!-- BOTONES -->
  <div class="mb-4 d-flex flex-wrap gap-2">
    <button class="btn btn-primary" onclick="cargarContenido('InternacionalGeneral.html')">General</button>
    <button class="btn btn-outline-primary" onclick="cargarContenido('InternacionalAutor.html')">Derechos de Autor</button>
    <button class="btn btn-outline-primary" onclick="cargarContenido('InternacionalIndustrial.html')">Propiedad Industrial</button>
    <button class="btn btn-outline-secondary" onclick="cargarContenido('InternacionalSui.html')">Sui Generis</button>
  </div>

  <!-- CONTENIDO -->
  <div id="contenido">
    <p>Selecciona una categoría para ver la normativa internacional.</p>
  </div>

</section>

        </div>
      </div>

    </div>
  </main>


  <!-- Scripts -->
  <script src="js/quinti.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
function cargarContenido(url) {
  fetch(url)
    .then(res => res.text())
    .then(data => {
      document.getElementById("contenido").innerHTML = data;
    })
    .catch(err => {
      document.getElementById("contenido").innerHTML = "<p>Error al cargar contenido.</p>";
    });
}
</script>
<script>
window.onload = () => {
  cargarContenido('InternacionalGeneral.html');
};
</script>
